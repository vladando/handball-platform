version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Handball Transfer Platform — Self-Hosted Stack
# Services: PostgreSQL · MinIO · Next.js App
# To migrate to cloud: point DATABASE_URL + MINIO_* env vars
#   at your cloud provider. No code changes required.
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: handball_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-handball}
      POSTGRES_USER: ${POSTGRES_USER:-handball_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # optional seed scripts
    ports:
      - "5432:5432"   # expose only on LAN; close this in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-handball_user} -d ${POSTGRES_DB:-handball}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handball_net

  # ── MinIO (self-hosted S3) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: handball_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handball_net

  # ── MinIO bucket bootstrapper ────────────────────────────────────
  # Runs once to create the required buckets, then exits.
  minio_init:
    image: minio/mc:latest
    container_name: handball_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/handball-players;
        mc mb --ignore-existing local/handball-documents;
        mc anonymous set download local/handball-players;
        exit 0;
      "
    networks:
      - handball_net

  # ── Next.js Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: handball_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-handball_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-handball}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PLAYERS: handball-players
      MINIO_BUCKET_DOCS: handball-documents
    ports:
      - "3000:3000"
    networks:
      - handball_net

# ── Nginx Reverse Proxy ──────────────────────────────────────────
# Terminates SSL, proxies /api and / to the Next.js app,
# and /minio-console to the MinIO UI (admin only).
  nginx:
    image: nginx:alpine
    container_name: handball_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # Let's Encrypt certs live here
      - certbot_www:/var/www/certbot:ro
    networks:
      - handball_net

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: handball_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually on first setup:
    #   docker compose run --rm certbot certonly --webroot \
    #     --webroot-path /var/www/certbot \
    #     -d yourdomain.com --email you@email.com --agree-tos
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    networks:
      - handball_net

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  minio_data:
    driver: local
  certbot_www:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
networks:
  handball_net:
    driver: bridge
